<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Meu RPG VR</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
</head>

<body>

<!-- A propriedade webxr aqui impede que a câmera pule para 1,60m de altura no modo VR -->
<a-scene webxr="referenceSpaceType: local">

    <!-- Assets -->
    <a-assets>
        <audio id="audioPorta" src="02_Porta.mp3"></audio>
        <audio id="audioGrifo" src="02_Grifo.mp3"></audio>
        <audio id="audioVeado" src="02_Veado.mp3"></audio>
        <audio id="audioCoracao" src="02_Coração.mp3"></audio>
        <audio id="audioCoroa" src="02_Coroa.mp3"></audio>
        <audio id="audioChifre" src="02_Chifre.mp3"></audio>
        <audio id="musicaAmbiente" src="trilha.mp3"></audio>
        
        <video id="videoSaida" src="Saida_Cena_1.mp4" preload="auto"></video>
    </a-assets>

    <!-- Panorama -->
    <a-sky src="Untitled.png"></a-sky>
    <a-entity id="hotspotContainer"></a-entity>

    <!-- GRID DE REFERÊNCIA -->
    <a-plane
        id="referenceGrid"
        visible="false"
        position="0 1.5 -3"
        rotation="-90 0 0"
        width="20"
        height="20"
        color="#222222"
        material="wireframe:true">
    </a-plane>

    <!-- RIG GERAL DO JOGADOR -->
    <a-entity id="cameraRig">

        <!-- CÂMERA/CABEÇA (Onde ficam apenas os elementos HUD fixos como mira e avisos) -->
        <a-entity id="head" camera look-controls>
            <a-cursor
                id="cursor"
                color="white"
                fuse="false"
                geometry="primitive:ring; radiusInner:0.01; radiusOuter:0.02">
            </a-cursor>

            <a-ring
                id="progressRing"
                position="0 0 -1"
                radius-inner="0.028"
                radius-outer="0.04"
                color="white"
                opacity="0.8"
                theta-length="0">
            </a-ring>

            <a-text
                id="actionText"
                value=""
                position="0 0.1 -1"
                align="center"
                width="1.5"
                color="#FFD700">
            </a-text>

            <a-plane
                id="videoScreen"
                visible="false"
                width="4"
                height="2.25"
                position="0 0 -0.8"
                material="src:#videoSaida">
            </a-plane>
        </a-entity>

        <!-- SEGUIDOR (Acompanha a visão horizontal, permitindo que você olhe para baixo e ative) -->
        <a-entity id="hudFollower">
            <a-circle
                id="recenterButton"
                position="0 -1.0 -2"
                radius="0.18"
                color="#AAAAAA"
                opacity="0.45"
                look-at="#head">
                <a-text
                    value="CENTRALIZAR"
                    position="0 -0.3 0"
                    align="center"
                    width="2"
                    color="#FFFFFF">
                </a-text>
            </a-circle>
        </a-entity>

    </a-entity>

</a-scene>

<script>
window.onload = () => {
    const musica = document.querySelector("#musicaAmbiente");
    musica.volume = 0.10;
    musica.loop = true;
    musica.play();

    const hotspotContainer = document.querySelector("#hotspotContainer");
    const progressRing = document.querySelector("#progressRing");
    const actionText = document.querySelector("#actionText");

    let debugMode = false; 
    let videoTocando = false;

    // Configuração dos Hotspots
    const hotspots = [
        { nome: "Grifo", posicao: "-1 -1.2 1.8", audio: "audioGrifo", tempo: 1000, raio: "0.08" },
        { nome: "Veado", posicao: "-2 -1.2 0.5", audio: "audioVeado", tempo: 1000, raio: "0.08" },
        { nome: "Coracao", posicao: "2 -1.2 0.5", audio: "audioCoracao", tempo: 1000, raio: "0.08" },
        { nome: "Coroa", posicao: "1 -1.2 -2", audio: "audioCoroa", tempo: 1000, raio: "0.08" },
        { nome: "Chifre", posicao: "-1 -1.2 -2", audio: "audioChifre", tempo: 1000, raio: "0.08" },
        { nome: "Porta", posicao: "0 -1.2 -3", audio: "audioPorta", tempo: 1000, raio: "0.08" }, 
        { nome: "SaidaVideo", posicao: "0 -1.2 3", tempo: 6000, raio: "0.12", mensagem: "SAINDO DA AREA", corTexto: "#FF0000", isVideo: true }
    ];

    hotspots.forEach((data, index) => {
        const hotspot = document.createElement("a-circle");

        hotspot.setAttribute("id", "hotspot_" + index);
        hotspot.setAttribute("position", data.posicao);
        hotspot.setAttribute("radius", data.raio); 
        hotspot.setAttribute("color", "#AAAAAA");
        hotspot.setAttribute("opacity", debugMode ? "0.20" : "0");
        hotspot.setAttribute("side", "double");
        hotspot.setAttribute("look-at", "#head"); // Agora olha para a nova Câmera real

        const tagLabel = document.createElement("a-text");
        tagLabel.setAttribute("class", "debugLabel");
        tagLabel.setAttribute("value", data.audio ? `Audio: ${data.audio}` : `Trigger: ${data.nome}`);
        tagLabel.setAttribute("position", "0 0.15 0"); 
        tagLabel.setAttribute("align", "center");
        tagLabel.setAttribute("width", "1.8");
        tagLabel.setAttribute("color", "#00FF00"); 
        tagLabel.setAttribute("visible", debugMode); 

        hotspot.appendChild(tagLabel);
        hotspotContainer.appendChild(hotspot);

        let timer = null;
        let progress = 0;
        let isCoolingDown = false; 

        hotspot.addEventListener("mouseenter", () => {
            if (videoTocando) return;

            hotspot.setAttribute("opacity", "0.45");
            hotspot.setAttribute("scale", "1.15 1.15 1.15");
            
            if (data.mensagem) {
                actionText.setAttribute("value", data.mensagem);
                actionText.setAttribute("color", data.corTexto ? data.corTexto : "#FFD700");
            }

            progress = 0;
            isCoolingDown = true; 

            setTimeout(() => {
                isCoolingDown = false;
            }, 500);

            timer = setInterval(() => {
                if (isCoolingDown || videoTocando) return; 

                progress += 50;
                const percent = (progress / data.tempo) * 360;
                progressRing.setAttribute("theta-length", percent);

                if (progress >= data.tempo) {
                    isCoolingDown = true;
                    progressRing.setAttribute("theta-length", "0");

                    if (data.audio) {
                        const audio = document.querySelector("#" + data.audio);
                        if (audio) {
                            audio.currentTime = 0;
                            audio.play();
                        }
                    }

                    hotspot.setAttribute("opacity", "0.85");
                    hotspot.setAttribute("color", "#FFFFFF");

                    if (data.isVideo) {
                        videoTocando = true;
                        actionText.setAttribute("value", ""); 
                        
                        const screen = document.querySelector("#videoScreen");
                        const video = document.querySelector("#videoSaida");
                        
                        screen.setAttribute("visible", true);
                        video.play();

                        video.onended = () => {
                            screen.setAttribute("visible", false);
                            videoTocando = false;
                        };
                    }

                    setTimeout(() => {
                        progress = 0;
                        isCoolingDown = false;
                    }, 1500); 
                }
            }, 50);
        });

        hotspot.addEventListener("mouseleave", () => {
            clearInterval(timer);
            isCoolingDown = false; 
            progressRing.setAttribute("theta-length", "0");
            hotspot.setAttribute("opacity", debugMode ? "0.20" : "0");
            hotspot.setAttribute("color", "#AAAAAA");
            hotspot.setAttribute("scale", "1 1 1");

            if (data.mensagem && !videoTocando) {
                actionText.setAttribute("value", "");
            }
        });
    });

    // LÓGICA DE RECENTRALIZAÇÃO (Botão Seguidor Inteligente)
    const recenterBtn = document.querySelector("#recenterButton");
    const rig = document.querySelector("#cameraRig");
    const head = document.querySelector("#head");
    const hudFollower = document.querySelector("#hudFollower");
    let rcTimer = null;
    let rcProgress = 0;

    // Essa função faz o botão "perseguir" o rosto do jogador nos lados, 
    // permitindo mirar nele apenas olhando para baixo.
    const updateFollower = () => {
        hudFollower.object3D.rotation.y = head.object3D.rotation.y;
        requestAnimationFrame(updateFollower);
    };
    updateFollower();

    // Ativação do botão de Recentralizar (Funciona igual aos outros)
    recenterBtn.addEventListener("mouseenter", () => {
        if (videoTocando) return;

        recenterBtn.setAttribute("opacity", "0.85");
        recenterBtn.setAttribute("scale", "1.15 1.15 1.15");
        rcProgress = 0;

        rcTimer = setInterval(() => {
            rcProgress += 50;
            const percent = (rcProgress / 2000) * 360; // 2 segundos para focar
            progressRing.setAttribute("theta-length", percent);

            if (rcProgress >= 2000) {
                rcProgress = 0;
                progressRing.setAttribute("theta-length", "0");

                // Gira o mundo na direção contrária que a pessoa está olhando
                rig.object3D.rotation.y -= head.object3D.rotation.y;

                // Feedback visual de sucesso (Pilha verde rapida)
                recenterBtn.setAttribute("color", "#00FF00");
                setTimeout(() => {
                    recenterBtn.setAttribute("color", "#AAAAAA");
                }, 1000);
            }
        }, 50);
    });

    recenterBtn.addEventListener("mouseleave", () => {
        clearInterval(rcTimer);
        rcProgress = 0;
        progressRing.setAttribute("theta-length", "0");
        recenterBtn.setAttribute("opacity", "0.45");
        recenterBtn.setAttribute("scale", "1 1 1");
        recenterBtn.setAttribute("color", "#AAAAAA");
    });

    // MODO DE DEPURACÃO (Teclado 'h')
    document.addEventListener("keydown", (event) => {
        if (event.key.toLowerCase() === "h") {
            debugMode = !debugMode;
            
            const referenceGrid = document.querySelector("#referenceGrid");
            if (referenceGrid) referenceGrid.setAttribute("visible", debugMode);

            document.querySelectorAll("a-circle:not(#recenterButton)").forEach(h => {
                h.setAttribute("opacity", debugMode ? "0.20" : "0");
            });

            document.querySelectorAll(".debugLabel").forEach(label => {
                label.setAttribute("visible", debugMode);
            });

            console.log("DEBUG:", debugMode ? "ON" : "OFF");
        }
    });
};
</script>

</body>
</html>
